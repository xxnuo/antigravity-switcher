name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Check tag commit on main
        id: check
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: verify-tag
    if: needs.verify-tag.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: make release

      - name: Package artifacts
        run: |
          mkdir -p release
          for file in dist/*; do
            name="$(basename "$file")"
            if [[ "$name" == *.exe ]]; then
              zip -j "release/${name%.exe}.zip" "$file"
            else
              tar -C dist -czf "release/${name}.tar.gz" "$name"
            fi
          done
          (
            cd release
            sha256sum * > sha256sums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.tag }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
